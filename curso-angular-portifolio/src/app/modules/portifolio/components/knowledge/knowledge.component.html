<div class="container">
  <h2>Conhecimentos</h2>
  <ul>
    @for (item of knowledgeArray(); track $index) {
      <li>
        <img
          [src]="item.src"
          [alt]="item.alt"
          loading="lazy"
          width="22px"
          height="22px"
        >
      </li>
    }
  </ul>
</div>
